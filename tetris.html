<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Tetris Reveal</title>
<style>
    :root {
        --primary: #4CAF50;
        --bg: #0a0a0a;
        --panel: rgba(255, 255, 255, 0.05);
    }
    body {
        margin: 0;
        background: var(--bg);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Segoe UI', Roboto, sans-serif;
        color: white;
        overflow: hidden;
    }
    .container {
        display: flex;
        gap: 20px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.02);
        border-radius: 24px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    /* Левая панель - Игра */
    .game-layout {
        display: flex;
        gap: 15px;
    }
    canvas#game {
        background: #000;
        border-radius: 8px;
        border: 2px solid var(--primary);
        box-shadow: 0 0 15px rgba(76, 175, 80, 0.2);
    }

    /* Правая колонка игры (Инфо) */
    .side-panel {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        width: 120px;
    }
    .info-card {
        background: var(--panel);
        border-radius: 12px;
        padding: 10px;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.1);
    }
    .label { font-size: 12px; color: #aaa; text-transform: uppercase; margin-bottom: 5px; }
    .value { font-size: 20px; font-weight: bold; color: var(--primary); }

    .next-piece-box canvas {
        background: transparent;
        width: 80px;
        height: 80px;
    }

    /* Фото-бокс */
    .photo-section {
        position: relative;
        width: 340px;
        height: 400px;
        border-radius: 12px;
        overflow: hidden;
        border: 2px solid rgba(255,255,255,0.1);
        cursor: pointer;
        transition: transform 0.3s;
    }
    .photo-section:hover { transform: scale(1.02); }
    .photo-section img { width: 100%; height: 100%; object-fit: cover; }
    .cover {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
        transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Сообщения */
    #msg {
        position: absolute;
        top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 10;
        background: rgba(0,0,0,0.85);
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        display: none;
        border: 1px solid var(--primary);
        box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    /* Управление внизу */
    .controls-hint {
        grid-column: span 2;
        display: flex;
        justify-content: center;
        gap: 15px;
        font-size: 11px;
        color: #666;
        margin-top: 10px;
    }
    .key { color: var(--primary); border: 1px solid #444; padding: 2px 6px; border-radius: 4px; }

    /* Кнопка назад */
    .back-btn {
        position: fixed; top: 20px; left: 20px;
        background: none; border: 1px solid #444; color: #aaa;
        padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.3s;
    }
    .back-btn:hover { border-color: #ff5722; color: white; }

    #fullscreen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000;
    }
</style>
</head>
<body>

<button class="back-btn" onclick="location.href='index.html'">← Назад</button>

<div class="container">
    <div class="game-layout">
        <div style="position:relative">
            <canvas id="game" width="240" height="400"></canvas>
            <div id="msg"></div>
        </div>
        
        <div class="side-panel">
            <div class="info-card">
                <div class="label">Очки</div>
                <div id="score" class="value">0</div>
            </div>

            <div class="info-card next-piece-box">
                <div class="label">След.</div>
                <canvas id="nextCanvas" width="80" height="80"></canvas>
            </div>

            <div class="info-card">
                <div class="label">Цель</div>
                <div class="value">100</div>
            </div>
        </div>
    </div>

    <div class="photo-section" onclick="openFullscreen()">
        <img id="photo">
        <div id="cover" class="cover"></div>
    </div>

    <div class="controls-hint" style="position: absolute; bottom: -35px; width: 100%;">
        <span><span class="key">←→</span> Движение</span>
        <span><span class="key">↑</span> Поворот</span>
        <span><span class="key">↓</span> Ускорить</span>
        <span><span class="key">Space</span> Пауза</span>
    </div>
</div>

<div id="fullscreen" onclick="this.style.display='none'">
    <img id="fullImg" style="max-width:90%; max-height:90%; border-radius:8px;">
</div>

<script>
// Настройки аналогичны вашим, но с оптимизацией отрисовки
let win=false, paused=false, gameover=false, score=0, nextPiece = null;
const photo=document.getElementById("photo"), fullImg=document.getElementById("fullImg"), 
      cover=document.getElementById("cover"), scoreText=document.getElementById("score"), msg=document.getElementById("msg");
const canvas=document.getElementById("game"), ctx=canvas.getContext("2d");
const nextCanvas = document.getElementById("nextCanvas"), nextCtx = nextCanvas.getContext("2d");

const COLS=12, ROWS=20, SIZE=20;
let arena=Array.from({length:ROWS},()=>Array(COLS).fill(0));
const colors=["#000","#00f0f0","#0000f0","#f0a000","#f0f000","#00f000","#a000f0","#f00000"];
const pieces={
    I:[[1,1,1,1]], J:[[2,0,0],[2,2,2]], L:[[0,0,3],[3,3,3]], 
    O:[[4,4],[4,4]], S:[[0,5,5],[5,5,0]], T:[[0,6,0],[6,6,6]], Z:[[7,7,0],[0,7,7]]
};

function createPiece() {
    const keys=Object.keys(pieces);
    return pieces[keys[Math.floor(Math.random()*keys.length)]];
}

function generateNextPiece() {
    nextPiece = createPiece();
    nextCtx.clearRect(0,0,80,80);
    const ox=(80-nextPiece[0].length*20)/2, oy=(80-nextPiece.length*20)/2;
    nextPiece.forEach((row,y)=>row.forEach((v,x)=>{
        if(v){ nextCtx.fillStyle=colors[v]; nextCtx.fillRect(ox+x*20,oy+y*20,18,18); }
    }));
}

let player={pos:{x:5,y:0}, matrix:null};

function playerReset(){
    player.matrix = nextPiece || createPiece();
    player.pos = {y:0, x:Math.floor(COLS/2 - player.matrix[0].length/2)};
    generateNextPiece();
    if(collide()){ arena.forEach(r=>r.fill(0)); score=0; updatePhoto(); }
}

function collide(){
    for(let y=0;y<player.matrix.length;y++)
        for(let x=0;x<player.matrix[y].length;x++)
            if(player.matrix[y][x] && (arena[y+player.pos.y] && arena[y+player.pos.y][x+player.pos.x])!==0) return true;
    return false;
}

function sweep(){
    let rowCount = 1;
    outer: for(let y=arena.length-1;y>=0;y--){
        for(let x=0;x<COLS;x++) if(arena[y][x]===0) continue outer;
        arena.splice(y,1);
        arena.unshift(Array(COLS).fill(0));
        score += 1;
        y++; 
        updatePhoto();
    }
}

function updatePhoto(){
    let p = Math.min(score, 100);
    cover.style.height = (100 - p) + "%";
    scoreText.innerText = score;
    if(score >= 100 && !win){ win=true; showMsg("🔥 ПОБЕДА!\nКликни на фото"); }
}

function draw(){
    ctx.fillStyle="#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
    drawM(arena,{x:0,y:0}); drawM(player.matrix,player.pos);
}

function drawM(m,o){
    m.forEach((row,y)=>row.forEach((v,x)=>{
        if(v){
            ctx.fillStyle=colors[v];
            ctx.shadowBlur = 10; ctx.shadowColor = colors[v];
            ctx.fillRect((x+o.x)*SIZE, (y+o.y)*SIZE, SIZE-1, SIZE-1);
            ctx.shadowBlur = 0;
        }
    }));
}

function rotate(m){ return m[0].map((_,i)=>m.map(r=>r[i]).reverse()); }

function playerDrop(){
    player.pos.y++;
    if(collide()){
        player.pos.y--;
        player.matrix.forEach((row,y)=>row.forEach((v,x)=>{ if(v) arena[y+player.pos.y][x+player.pos.x]=v; }));
        sweep(); playerReset();
    }
    dropCounter=0;
}

function showMsg(t){ msg.innerHTML=t; msg.style.display=t?"block":"none"; }

function openFullscreen(){ if(win) document.getElementById("fullscreen").style.display="flex"; }

let dropCounter=0, dropInterval=800, lastTime=0;
function update(time=0){
    const dt=time-lastTime; lastTime=time;
    if(!paused && !win) { dropCounter+=dt; if(dropCounter>dropInterval) playerDrop(); }
    draw(); requestAnimationFrame(update);
}

document.addEventListener("keydown",e=>{
    if(e.code==="Space"){ paused=!paused; showMsg(paused?"⏸ ПАУЗА":""); return; }
    if(paused||win) return;
    if(e.key==="ArrowLeft"){ player.pos.x--; if(collide()) player.pos.x++; }
    else if(e.key==="ArrowRight"){ player.pos.x++; if(collide()) player.pos.x--; }
    else if(e.key==="ArrowDown") playerDrop();
    else if(e.key==="ArrowUp"){
        const old=player.matrix; player.matrix=rotate(player.matrix);
        if(collide()) player.matrix=old;
    }
});

// Init
const num=Math.floor(Math.random()*82)+1;
photo.src = fullImg.src = `photo${num}.jpg`;
generateNextPiece();
playerReset();
update();
</script>
</body>
</html>
