<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Tetris + Фото</title>
<style>
body{
margin:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:white;
}
.container{
display:flex;
gap:40px;
align-items:center;
flex-wrap: wrap;
justify-content: center;
}
.game-block{
text-align:center;
position:relative;
}
canvas{
background:black;
border:4px solid #4CAF50;
}
#score{
margin-bottom:10px;
font-size:22px;
}
#msg{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:30px;
display:none;
text-align:center;
white-space: pre-line;
background: rgba(0,0,0,0.7);
padding: 15px 25px;
border-radius: 20px;
}
.photo-box{
position:relative;
width:400px;
height:400px;
border:4px solid white;
overflow:hidden;
cursor:pointer;
}
.photo-box img{
width:100%;
height:100%;
object-fit:cover;
}
.cover{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
transition:height 0.3s;
}
#fullscreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index: 100;
}
#fullscreen img{
max-width:90%;
max-height:90%;
}

/* Панель управления */
.controls-panel {
    margin-top: 15px;
    display: flex;
    justify-content: center;
    gap: 25px;
    background: #222;
    padding: 12px 20px;
    border-radius: 50px;
    border: 1px solid #4CAF50;
}

.control-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
}

.control-item span {
    background: #333;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid #4CAF50;
    color: #4CAF50;
    font-weight: bold;
}

/* Кнопка назад */
.back-button {
    position: fixed;
    top: 20px;
    left: 20px;
    background: #ff5722;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 12px 25px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: 0.3s;
    border: 2px solid #ff9800;
    z-index: 1000;
}

.back-button:hover {
    background: #ff7043;
    transform: scale(1.05);
    box-shadow: 0 0 20px #ff5722;
}

.back-button:active {
    transform: scale(0.95);
}

/* Иконка следующей фигуры */
.next-piece {
    margin-top: 15px;
    background: #222;
    border-radius: 20px;
    padding: 15px;
    border: 2px solid #4CAF50;
    display: inline-block;
}

.next-piece canvas {
    width: 96px;
    height: 96px;
    border: 2px solid #4CAF50;
    background: black;
}
</style>
</head>
<body>

<button class="back-button" onclick="goBack()">
    <span>◀</span> Назад к играм
</button>

<div class="container">
<div class="game-block">
<div id="score">Очки: 0</div>
<canvas id="game" width="240" height="400"></canvas>
<div id="msg"></div>

<!-- Подсказки управления -->
<div class="controls-panel">
    <div class="control-item"><span>← →</span> движение</div>
    <div class="control-item"><span>↑</span> поворот</div>
    <div class="control-item"><span>↓</span> вниз</div>
    <div class="control-item"><span>Пробел</span> пауза</div>
</div>

<!-- Иконка следующей фигуры -->
<div class="next-piece">
    <div style="margin-bottom: 5px; color: #4CAF50;">Следующая:</div>
    <canvas id="nextCanvas" width="80" height="80"></canvas>
</div>

</div>

<div class="photo-box" onclick="openFullscreen()">
<img id="photo">
<div id="cover" class="cover"></div>
</div>

</div>

<div id="fullscreen" onclick="this.style.display='none'">
<img id="fullImg">
</div>

<script>
let win=false;
let paused=false;
let gameover=false;
let score=0;
let nextPiece = null; // для хранения следующей фигуры

// ======== ФОТО ========
const photo=document.getElementById("photo");
const fullImg=document.getElementById("fullImg");
const fullscreen=document.getElementById("fullscreen");
const cover=document.getElementById("cover");
const scoreText=document.getElementById("score");
const msg=document.getElementById("msg");

function setRandomPhoto(){
    const num=Math.floor(Math.random()*82)+1;
    const src="photo"+num+".jpg";
    photo.src=src;
    fullImg.src=src;
}

function openFullscreen(){
    if(!win) return;
    fullscreen.style.display="flex";
}

// ======== ТЕТРИС ========
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const nextCanvas = document.getElementById("nextCanvas");
const nextCtx = nextCanvas.getContext("2d");

const COLS=12;
const ROWS=20;
const SIZE=20;
let arena=Array.from({length:ROWS},()=>Array(COLS).fill(0));

const colors=["#000","cyan","blue","orange","yellow","green","purple","red"];
const pieces={
I:[[1,1,1,1]],
J:[[2,0,0],[2,2,2]],
L:[[0,0,3],[3,3,3]],
O:[[4,4],[4,4]],
S:[[0,5,5],[5,5,0]],
T:[[0,6,0],[6,6,6]],
Z:[[7,7,0],[0,7,7]]
};

function createPiece(){
    const keys=Object.keys(pieces);
    return pieces[keys[Math.floor(Math.random()*keys.length)]];
}

// Генерация следующей фигуры
function generateNextPiece() {
    nextPiece = createPiece();
    drawNextPiece();
}

function drawNextPiece() {
    nextCtx.clearRect(0, 0, 80, 80);
    if (!nextPiece) return;
    
    const offsetX = (80 - nextPiece[0].length * 20) / 2;
    const offsetY = (80 - nextPiece.length * 20) / 2;
    
    nextPiece.forEach((row, y) => {
        row.forEach((val, x) => {
            if (val) {
                nextCtx.fillStyle = colors[val];
                nextCtx.fillRect(offsetX + x * 20, offsetY + y * 20, 19, 19);
            }
        });
    });
}

function rotate(matrix){return matrix[0].map((_,i)=>matrix.map(row=>row[i]).reverse());}

let player={pos:{x:5,y:0},matrix:createPiece()};

// Инициализируем следующую фигуру
generateNextPiece();

function collide(){
    for(let y=0;y<player.matrix.length;y++)
        for(let x=0;x<player.matrix[y].length;x++)
            if(player.matrix[y][x] && (arena[y+player.pos.y] && arena[y+player.pos.y][x+player.pos.x])!==0)
                return true;
    return false;
}

function merge(){
    player.matrix.forEach((row,y)=>row.forEach((val,x)=>{
        if(val) arena[y+player.pos.y][x+player.pos.x]=val;
    }));
}

function sweep(){
    outer: for(let y=arena.length-1;y>=0;y--){
        for(let x=0;x<COLS;x++){
            if(arena[y][x]===0) continue outer;
        }
        arena.splice(y,1);
        arena.unshift(Array(COLS).fill(0));
        score += 1; // теперь 1 линия = 1 очко
        updatePhoto();
    }
}

function drawMatrix(matrix,offset){
    matrix.forEach((row,y)=>row.forEach((val,x)=>{
        if(val){
            ctx.fillStyle=colors[val];
            ctx.fillRect((x+offset.x)*SIZE,(y+offset.y)*SIZE,SIZE-1,SIZE-1);
        }
    }));
}

function draw(){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    drawMatrix(arena,{x:0,y:0});
    drawMatrix(player.matrix,player.pos);
}

function playerReset(){
    // Вместо создания новой фигуры, используем nextPiece
    if (nextPiece) {
        player.matrix = nextPiece;
    } else {
        player.matrix = createPiece();
    }
    player.pos.y=0;
    player.pos.x=5;
    
    // Генерируем новую следующую фигуру
    generateNextPiece();
    
    if(collide()) gameOver();
}

function playerDrop(){
    player.pos.y++;
    if(collide()){
        player.pos.y--;
        merge();
        sweep();
        playerReset();
    }
    dropCounter=0;
}

function playerMove(dir){
    player.pos.x+=dir;
    if(collide()) player.pos.x-=dir;
}

function playerRotate(){
    const old=player.matrix;
    player.matrix=rotate(player.matrix);
    if(collide()) player.matrix=old;
}

// ======== ИГРОВОЙ ЦИКЛ ========
let dropCounter=0;
let dropInterval=800;
let lastTime=0;

function update(time=0){
    const delta=time-lastTime;
    lastTime=time;
    if(!paused && !gameover && !win){
        dropCounter+=delta;
        if(dropCounter>dropInterval) playerDrop();
    }
    draw();
    requestAnimationFrame(update);
}

function gameOver(){
    gameover=true;
    showMsg("💀 Проигрыш");
    setTimeout(reset,1500);
}

function reset(){
    arena.forEach(row=>row.fill(0));
    score=0;
    win=false;
    gameover=false;
    paused=false;
    player.matrix = createPiece();
    generateNextPiece(); // обновляем следующую фигуру
    playerReset(); // используем playerReset для установки позиции
    updatePhoto();
    scoreText.innerText="Очки: 0";
    msg.style.display="none";
    setRandomPhoto();
}

function showMsg(text){
    msg.innerText=text;
    msg.style.display="block";
}

function updatePhoto(){
    let percent=Math.min(score,100);
    cover.style.height=(100-percent)+"%";
    scoreText.innerText="Очки: "+score;
    if(score>=100){
        win=true;
        showMsg("🔥 Победа!\nКликни фото");
    }
}

// ======== УПРАВЛЕНИЕ ========
document.addEventListener("keydown",e=>{
    if(e.code==="Space"||e.key==="p"){
        if(win||gameover)return;
        paused=!paused;
        showMsg(paused?"⏸ Пауза":"");
        if(!paused) msg.style.display="none";
        return;
    }
    if(paused||win||gameover)return;
    
    // Запрет прокрутки
    if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
        e.preventDefault();
    }
    
    if(e.key==="ArrowLeft") playerMove(-1);
    else if(e.key==="ArrowRight") playerMove(1);
    else if(e.key==="ArrowDown") playerDrop();
    else if(e.key==="ArrowUp") playerRotate();
});

// ======== НАЗАД НА ГЛАВНУЮ ========
function goBack() {
    window.location.href = 'index.html';
}

// ======== СТАРТ ========
setRandomPhoto();
playerReset();
updatePhoto();
update();
</script>

</body>
</html>
