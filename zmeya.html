<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Photo Reveal</title>
<style>
    :root {
        --primary: #4CAF50;
        --accent: #ff9800;
        --bg: #0a0a0a;
        --panel: rgba(255, 255, 255, 0.05);
    }
    body {
        margin: 0;
        background: var(--bg);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Segoe UI', Roboto, sans-serif;
        color: white;
        overflow: hidden;
    }

    /* Кнопка назад */
    .back-btn {
        position: fixed; top: 20px; left: 20px;
        background: none; border: 1px solid #444; color: #aaa;
        padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.3s;
        z-index: 100;
    }
    .back-btn:hover { border-color: #ff5722; color: white; }

    .container {
        display: flex;
        gap: 20px;
        padding: 25px;
        background: rgba(255, 255, 255, 0.02);
        border-radius: 24px;
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    /* Игровая зона */
    .game-layout { display: flex; gap: 15px; }
    
    .canvas-wrapper { position: relative; }
    canvas#game {
        background: #000;
        border-radius: 12px;
        border: 2px solid var(--primary);
        box-shadow: 0 0 20px rgba(76, 175, 80, 0.15);
        display: block;
    }

    /* Правая панель с настройками и инфо */
    .side-panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 160px;
    }

    .card {
        background: var(--panel);
        border-radius: 15px;
        padding: 12px;
        border: 1px solid rgba(255,255,255,0.08);
    }

    .label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
    .value { font-size: 24px; font-weight: bold; color: var(--primary); text-align: center; }

    /* Кнопки выбора */
    .btn-group { display: flex; flex-direction: column; gap: 5px; }
    .btn-group button {
        background: #222; border: 1px solid #444; color: #ccc;
        padding: 6px; border-radius: 8px; cursor: pointer; font-size: 12px; transition: 0.2s;
    }
    .btn-group button.active { background: var(--primary); color: #000; border-color: var(--primary); font-weight: bold; }
    .btn-group button:disabled { opacity: 0.3; cursor: default; }

    #startBtn {
        background: var(--accent); border: none; color: #000;
        padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer;
        margin-top: auto; transition: 0.3s;
    }
    #startBtn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,152,0,0.4); }
    #startBtn:disabled { background: #333; color: #666; cursor: not-allowed; }

    /* Фото */
    .photo-section {
        position: relative;
        width: 400px;
        height: 400px;
        border-radius: 15px;
        overflow: hidden;
        border: 2px solid rgba(255,255,255,0.1);
        cursor: pointer;
    }
    .photo-section img { width: 100%; height: 100%; object-fit: cover; }
    .cover {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(135deg, #111 0%, #000 100%);
        transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Текст-оверлей */
    #pauseText {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.9); padding: 20px; border-radius: 20px;
        text-align: center; border: 1px solid var(--primary); z-index: 10;
        min-width: 180px; font-weight: bold; line-height: 1.4;
    }

    /* Подсказки */
    .hints {
        position: absolute; bottom: -35px; width: 100%;
        display: flex; justify-content: center; gap: 20px;
        font-size: 11px; color: #555;
    }
    .hints span b { color: var(--primary); border: 1px solid #333; padding: 1px 5px; border-radius: 4px; }

    #fullscreen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000;
    }
</style>
</head>
<body>

<button class="back-btn" onclick="location.href='index.html'">← К играм</button>

<div class="container">
    <div class="game-layout">
        <div class="canvas-wrapper">
            <canvas id="game" width="400" height="400"></canvas>
            <div id="pauseText">Выберите настройки <br> и нажмите Старт</div>
        </div>

        <div class="side-panel">
            <div class="card">
                <div class="label">Очки</div>
                <div id="score" class="value">0</div>
            </div>

            <div class="card">
                <div class="label">Сложность</div>
                <div class="btn-group" id="diffGroup">
                    <button onclick="setDiff('easy', this)">Лёгкий</button>
                    <button onclick="setDiff('hard', this)">Сложный</button>
                </div>
            </div>

            <div class="card">
                <div class="label">Скорость</div>
                <div class="btn-group" id="speedGroup">
                    <button onclick="setSpeed('slow', this)">Медленно</button>
                    <button onclick="setSpeed('medium', this)">Средне</button>
                    <button onclick="setSpeed('fast', this)">Быстро</button>
                </div>
            </div>

            <button id="startBtn" onclick="startGame()" disabled>▶ СТАРТ</button>
        </div>
    </div>

    <div class="photo-section" onclick="openFullscreen()">
        <img id="photo">
        <div id="cover" class="cover"></div>
    </div>

    <div class="hints">
        <span><b>↑ ↓ ← →</b> Движение</span>
        <span><b>Space</b> Пауза</span>
        <span>Цель: <b>100</b></span>
    </div>
</div>

<div id="fullscreen" onclick="this.style.display='none'">
    <img id="fullImg" style="max-width:90%; max-height:90%; border-radius:10px; box-shadow: 0 0 50px rgba(0,0,0,1);">
</div>

<script>
let paused = false, gameOver = false, win = false, gameStarted = false;
let currentDifficulty = null, currentSpeed = null;
let frameSkip = 8, count = 0, score = 0, grid = 20;

const canvas = document.getElementById("game"), ctx = canvas.getContext("2d");
const photo = document.getElementById("photo"), fullImg = document.getElementById("fullImg"), 
      cover = document.getElementById("cover"), scoreVal = document.getElementById("score"), 
      msg = document.getElementById("pauseText"), sBtn = document.getElementById("startBtn");

let snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
let apple = { x: 320, y: 320 };

function setRandomPhoto() {
    const num = Math.floor(Math.random() * 82) + 1;
    photo.src = fullImg.src = `photo${num}.jpg`;
}

function setDiff(d, btn) {
    currentDifficulty = d;
    highlight(btn, 'diffGroup');
}

function setSpeed(s, btn) {
    currentSpeed = s;
    frameSkip = s === 'slow' ? 14 : s === 'medium' ? 8 : 4;
    highlight(btn, 'speedGroup');
}

function highlight(btn, group) {
    document.querySelectorAll(`#${group} button`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sBtn.disabled = !(currentDifficulty && currentSpeed);
}

function startGame() {
    gameStarted = true; paused = false; gameOver = false; win = false;
    score = 0; snake.maxCells = 4; snake.cells = []; snake.dx = grid; snake.dy = 0;
    snake.x = 160; snake.y = 160;
    scoreVal.innerText = "0";
    msg.style.display = "none";
    updatePhoto();
    document.querySelectorAll('.btn-group button').forEach(b => b.disabled = true);
    sBtn.disabled = true;
}

function updatePhoto() {
    cover.style.height = (100 - Math.min(score, 100)) + "%";
    if(score >= 100 && !win) { win = true; msg.innerHTML = "🔥 ПОБЕДА!<br>Кликни на фото"; msg.style.display = "block"; }
}

function loop(time) {
    requestAnimationFrame(loop);
    if(!gameStarted || paused || gameOver || win) return;

    if(++count < frameSkip) return;
    count = 0;

    snake.x += snake.dx; snake.y += snake.dy;

    if(currentDifficulty === 'hard') {
        if(snake.x < 0 || snake.x >= canvas.width || snake.y < 0 || snake.y >= canvas.height) end();
    } else {
        if(snake.x < 0) snake.x = canvas.width - grid;
        else if(snake.x >= canvas.width) snake.x = 0;
        if(snake.y < 0) snake.y = canvas.height - grid;
        else if(snake.y >= canvas.height) snake.y = 0;
    }

    snake.cells.unshift({x: snake.x, y: snake.y});
    if(snake.cells.length > snake.maxCells) snake.cells.pop();

    snake.cells.forEach((cell, index) => {
        if(cell.x === apple.x && cell.y === apple.y) {
            snake.maxCells++; score++; scoreVal.innerText = score;
            apple.x = Math.floor(Math.random()*20)*grid;
            apple.y = Math.floor(Math.random()*20)*grid;
            updatePhoto();
        }
        for(let i = index + 1; i < snake.cells.length; i++) {
            if(cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) end();
        }
    });

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#ff4444"; ctx.fillRect(apple.x, apple.y, grid-1, grid-1);
    ctx.fillStyle = "lime";
    snake.cells.forEach(c => ctx.fillRect(c.x, c.y, grid-1, grid-1));
}

function end() {
    gameOver = true;
    msg.innerHTML = "💀 ПРОИГРЫШ<br>Очки: " + score;
    msg.style.display = "block";
    setTimeout(() => {
        document.querySelectorAll('.btn-group button').forEach(b => b.disabled = false);
        sBtn.disabled = false;
        msg.innerHTML = "Настройте и<br>нажмите Старт";
        setRandomPhoto();
    }, 2000);
}

document.addEventListener("keydown", e => {
    if(e.code === "Space") { paused = !paused; msg.innerHTML = "⏸ ПАУЗА"; msg.style.display = paused ? "block" : "none"; }
    if(paused || !gameStarted) return;
    if(e.key === "ArrowLeft" && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
    else if(e.key === "ArrowUp" && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
    else if(e.key === "ArrowRight" && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
    else if(e.key === "ArrowDown" && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
    if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
});

function openFullscreen() { if(win) document.getElementById("fullscreen").style.display = "flex"; }

setRandomPhoto();
requestAnimationFrame(loop);
</script>
</body>
</html>
